<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
  <link rel="mask-icon" href="/favicon.svg" color="#111827">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="Cross-Origin-Opener-Policy" content="allow-popups" />
  <meta name="theme-color" content="#111827">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f172a">
  <meta name="msapplication-navbutton-color" content="#111827">
  <meta name="msapplication-TileColor" content="#111827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MCIM">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="MCIM">
  <title>MCIM - Sistema de Gestión</title>
  <script type="text/javascript">
    // Single Page Apps for GitHub Pages
    // MIT License
    // https://github.com/rafgraph/spa-github-pages
    (function(l) {
      if (l.search[1] === '/' ) {
        var decoded = l.search.slice(1).split('&').map(function(s) {
          return s.replace(/~and~/g, '&');
        }).join('?');
        window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location))
  </script>
</head>

<body>
  <main id="root"></main>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
