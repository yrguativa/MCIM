<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      const path = window.location.pathname;
      const repo = '/MCIM/'; // Replace with your repository name
      const base = path.startsWith(repo) ? repo : '/';
      const newPath = path.startsWith(repo) ? path.substring(repo.length) : path.substring(1);
      window.location.href = `${base}?/${newPath}${window.location.search}${window.location.hash}`;
    </script>
  </head>
  <body>
  </body>
</html>
