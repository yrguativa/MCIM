name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        run: |
          corepack enable || true
          corepack prepare pnpm@9 --activate || npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend lint
        id: lint
        continue-on-error: true
        working-directory: ./app
        run: |
          pnpm lint 2>&1 | tee lint-output.txt
          echo "lint_exit=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Run frontend unit tests with coverage
        id: unit
        continue-on-error: true
        working-directory: ./app
        run: |
          pnpm test -- --coverage 2>&1 | tee unit-output.txt
          echo "unit_exit=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
          grep -E "^\s*(Statements|Branches|Functions|Lines)" unit-output.txt 2>/dev/null | tr -s ' ' > coverage-summary.txt || true
      - name: Extract coverage percentages
        id: coverage
        if: always()
        working-directory: ./app
        run: |
          if [ -f coverage-summary.txt ]; then
            statements=$(grep "Statements" coverage-summary.txt | awk '{print $2}' | tr -d ' %')
            branches=$(grep "Branches" coverage-summary.txt | awk '{print $2}' | tr -d ' %')
            functions=$(grep "Functions" coverage-summary.txt | awk '{print $2}' | tr -d ' %')
            lines=$(grep "Lines" coverage-summary.txt | awk '{print $2}' | tr -d ' %')
            echo "statements=${statements:-0}" >> $GITHUB_OUTPUT
            echo "branches=${branches:-0}" >> $GITHUB_OUTPUT
            echo "functions=${functions:-0}" >> $GITHUB_OUTPUT
            echo "lines=${lines:-0}" >> $GITHUB_OUTPUT
            echo "has_coverage=true" >> $GITHUB_OUTPUT
          else
            echo "has_coverage=false" >> $GITHUB_OUTPUT
          fi
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'http://localhost:3000' }}

      - name: Run backend unit tests
        id: backend
        continue-on-error: true
        working-directory: ./cells-back
        run: |
          pnpm test 2>&1 | tee backend-output.txt
          echo "backend_exit=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Install Playwright browsers
        if: always()
        working-directory: ./app
        run: pnpm exec playwright install --with-deps chromium

      - name: Start backend
        if: always()
        run: |
          pnpm --filter cells-back build 2>&1 || true
          pnpm --filter cells-back start:dev &
          sleep 5
          echo "Backend started"

      - name: Start frontend
        if: always()
        working-directory: ./app
        run: |
          pnpm dev &
          npx wait-on http://localhost:5173 --timeout 30000
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'http://localhost:3000' }}

      - name: Run E2E tests
        id: e2e
        if: always()
        continue-on-error: true
        working-directory: ./app
        run: |
          pnpm test:e2e 2>&1 | tee e2e-output.txt
          echo "e2e_exit=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Generate test summary
        if: always()
        run: |
          echo "## 📋 Resumen de Pruebas" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Frontend - Lint" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.lint.outputs.lint_exit }}" = "0" ]; then
            echo "✅ **Pasó**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Falló** - Ver detalles abajo" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            head -50 lint-output.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Sin output" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Frontend - Unit Tests" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.unit.outputs.unit_exit }}" = "0" ]; then
            echo "✅ **Pasó**" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.unit.outputs.unit_exit }}" = "" ]; then
            echo "⏭️ **No ejecutado**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Falló**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -E "FAIL|PASS|Tests:" unit-output.txt 2>/dev/null | head -20 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          echo "### 📊 Cobertura de Código (Frontend)" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.coverage.outputs.has_coverage }}" = "true" ]; then
            echo "| Métrica | Porcentaje |" >> $GITHUB_STEP_SUMMARY
            echo "|---------|-----------|" >> $GITHUB_STEP_SUMMARY
            echo "| **Statements** | ${{ steps.coverage.outputs.statements }}% |" >> $GITHUB_STEP_SUMMARY
            echo "| **Branches** | ${{ steps.coverage.outputs.branches }}% |" >> $GITHUB_STEP_SUMMARY
            echo "| **Functions** | ${{ steps.coverage.outputs.functions }}% |" >> $GITHUB_STEP_SUMMARY
            echo "| **Lines** | ${{ steps.coverage.outputs.lines }}% |" >> $GITHUB_STEP_SUMMARY
          else
            echo "⏭️ No disponible (los tests no se ejecutaron o no generaron cobertura)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Backend - Unit Tests" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.backend.outputs.backend_exit }}" = "0" ]; then
            echo "✅ **Pasó**" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.backend.outputs.backend_exit }}" = "" ]; then
            echo "⏭️ **No ejecutado**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Falló**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -E "FAIL|PASS|Tests:" backend-output.txt 2>/dev/null | head -20 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### E2E Tests" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.e2e.outputs.e2e_exit }}" = "0" ]; then
            echo "✅ **Pasó**" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.e2e.outputs.e2e_exit }}" = "" ]; then
            echo "⏭️ **No ejecutado**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Falló**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -E "passed|failed|pending|✓|✗|×" e2e-output.txt 2>/dev/null | head -30 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "_Las pruebas no bloquean el deploy. Revisa el resumen para más detalles._" >> $GITHUB_STEP_SUMMARY

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/coverage/
          retention-days: 7

      - name: Upload test output logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-logs
          path: |
            app/lint-output.txt
            app/unit-output.txt
            app/backend-output.txt
            app/e2e-output.txt
            app/coverage-summary.txt
          retention-days: 7
