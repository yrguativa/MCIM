name: Deploy app to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        run: |
          corepack enable || true
          corepack prepare pnpm@9 --activate || npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --filter ./app... --frozen-lockfile

      - name: Build app
        working-directory: ./app
        env:
          VITE_BASE: "/${{ github.event.repository.name }}/"
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
        run: pnpm build

      - name: Publish to FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          set +H
          echo "machine $FTP_HOST login $FTP_USER password $FTP_PASS" > ~/.netrc
          chmod 600 ~/.netrc
          echo "Conectando a $FTP_HOST..."
          lftp -c "set net:timeout 30; set net:max-retries 2; open $FTP_HOST; mirror -R -e -v ./app/dist ./"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4