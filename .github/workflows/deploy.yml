name: Deploy app to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        run: |
          corepack enable || true
          corepack prepare pnpm@9 --activate || npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --filter ./app... --frozen-lockfile

      - name: Build app
        working-directory: ./app
        env:
          VITE_BASE: "/${{ github.event.repository.name }}/"
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
        run: pnpm build

      - name: Publish to FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          python3 -c "
import ftplib, os, sys
from pathlib import Path

host = os.environ['FTP_HOST']
user = os.environ['FTP_USER']
passwd = os.environ['FTP_PASS']

print(f'Conectando a {host}...')
ftp = ftplib.FTP(host, user, passwd, timeout=30)
print('Autenticacion exitosa. Subiendo archivos...')

local_root = Path('./app/dist')
remote_root = '/'

def upload_dir(ftp, local_path, remote_path):
    ftp.cwd(remote_path)
    for entry in local_path.iterdir():
        if entry.is_dir():
            try:
                ftp.mkd(entry.name)
            except:
                pass
            upload_dir(ftp, entry, entry.name)
            ftp.cwd('..')
        else:
            with open(entry, 'rb') as f:
                ftp.storbinary(f'STOR {entry.name}', f)
                print(f'  Subido: {entry.relative_to(local_root)}')

upload_dir(ftp, local_root, remote_root)
ftp.quit()
print('Publicacion FTP completada.')
"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4